name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4]
        laravel: [13.*]
        stability: [prefer-stable]
        include:
          - laravel: 13.*
            testbench: ^11.0

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none

      - name: Authenticate Composer for private GitHub deps
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        # ichava/core (and laranail/package-tools while still private) live
        # in private repos. Composer's git clone has no auth on a fresh runner
        # without this. Provision a PAT with `repo:read` scope and store it
        # as the GH_PACKAGES_PAT secret on each consuming repo. The step
        # short-circuits cleanly when the secret is absent, so public
        # forks aren't blocked.
        if: env.GH_PACKAGES_PAT != ''
        run: |
          composer config --global --auth github-oauth.github.com "$GH_PACKAGES_PAT"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest
